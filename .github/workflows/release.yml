name: release

# Push a version tag (vX.Y.Z) → builds signed installers on macOS + Windows,
# publishes a GitHub Release, and uploads `latest.json` for the in-app updater.
#
# Required repo secrets:
#   TAURI_SIGNING_PRIVATE_KEY           — content of the minisign private key
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD  — its password ("" if none)

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Local dev builds only the signed .app (reliable). Release builds add
          # dmg/nsis + updater artifacts here — clean CI runners bundle DMG fine.
          - platform: macos-latest
            args: "--target aarch64-apple-darwin --bundles app,dmg,updater"
          - platform: windows-latest
            args: "--bundles nsis,updater"

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - run: npm ci

      - name: Build & release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "coffeeNetwork ${{ github.ref_name }}"
          releaseBody: "Автосборка. Установщики для macOS (.dmg) и Windows (.exe). Обновление внутри приложения подтянется автоматически."
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}
